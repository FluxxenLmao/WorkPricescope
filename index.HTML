<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Учет рабочих часов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --red: #ff3b30;
            --green: #34c759;
            --yellow: #ffcc00;
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --border: #38383a;
            --blue: #0a84ff;
        }
        
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f2f2f7;
                --card: #ffffff;
                --text: #000000;
                --text-secondary: #6e6e73;
                --border: #e5e5ea;
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: var(--card);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        
        .salary-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .salary-input-group label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        
        .salary-input {
            flex: 1;
            border: 1px solid var(--border);
            background: var(--bg);
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            outline: none;
        }
        
        .date-selector {
            background: var(--bg);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        
        .date-selector label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        input[type="date"] {
            width: 100%;
            padding: 12px;
            font-size: 17px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            font-family: inherit;
            -webkit-appearance: none;
        }
        
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        
        .month-btn {
            background: var(--bg);
            border: none;
            font-size: 20px;
            color: var(--blue);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .month-btn:active {
            opacity: 0.7;
        }
        
        .current-month {
            font-size: 18px;
            font-weight: 700;
        }
        
        .calendar-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .weekday {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 5px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        
        .day-cell {
            background: var(--card);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
            min-height: 50px;
            padding: 8px 0;
        }
        
        .day-cell:active {
            transform: scale(0.95);
        }
        
        .day-cell.empty {
            background: transparent;
            cursor: default;
        }
        
        .day-number {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .day-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
        }
        
        .day-cell.red { border-color: var(--red); }
        .day-cell.green { border-color: var(--green); }
        .day-cell.yellow { border-color: var(--yellow); }
        
        .day-cell.red .day-indicator { background: var(--red); }
        .day-cell.green .day-indicator { background: var(--green); }
        .day-cell.yellow .day-indicator { background: var(--yellow); }
        
        .day-cell.today {
            box-shadow: 0 0 0 2px var(--blue);
        }
        
        .summary {
            background: var(--card);
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .summary-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .summary-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--green);
        }
        
        .summary-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .modal-overlay.active {
            display: flex;
            opacity: 1;
            align-items: flex-end;
        }
        
        .modal-content {
            background: var(--card);
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }
        
        .close-btn {
            background: var(--bg);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .selected-date-display {
            background: var(--bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
        }
        
        .selected-date-display span {
            display: block;
            font-size: 24px;
            font-weight: 700;
            margin-top: 5px;
            color: var(--blue);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .status-selector {
            display: flex;
            gap: 8px;
        }
        
        .status-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid var(--border);
            background: var(--card);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
        }
        
        .status-btn.red { border-color: var(--red); color: var(--red); }
        .status-btn.yellow { border-color: var(--yellow); color: var(--yellow); }
        .status-btn.green { border-color: var(--green); color: var(--green); }
        
        .status-btn.active {
            color: white;
        }
        
        .status-btn.red.active { background: var(--red); }
        .status-btn.yellow.active { background: var(--yellow); color: #000; }
        .status-btn.green.active { background: var(--green); }
        
        .time-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .time-field {
            flex: 1;
        }
        
        .time-field label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .time-input-wrapper {
            position: relative;
        }
        
        input[type="time"] {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            text-align: center;
            -webkit-appearance: none;
        }
        
        .save-btn {
            width: 100%;
            padding: 16px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .delete-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--red);
            border: 1px solid var(--red);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .legend {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            font-size: 11px;
            background: var(--card);
            border-top: 1px solid var(--border);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }
        
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="salary-input-group">
            <label>Ставка ($/час)</label>
            <input type="number" class="salary-input" id="hourlyRate" placeholder="0.00" step="0.01">
        </div>
        
        <div class="date-selector">
            <label>Выбрать дату для заполнения</label>
            <input type="date" id="datePicker">
        </div>
        
        <div class="month-nav">
            <button class="month-btn" onclick="changeMonth(-1)">‹</button>
            <div class="current-month" id="currentMonth">Месяц</div>
            <button class="month-btn" onclick="changeMonth(1)">›</button>
        </div>
    </div>
    
    <div class="calendar-container">
        <div class="weekdays">
            <div class="weekday">Вс</div>
            <div class="weekday">Пн</div>
            <div class="weekday">Вт</div>
            <div class="weekday">Ср</div>
            <div class="weekday">Чт</div>
            <div class="weekday">Пт</div>
            <div class="weekday">Сб</div>
        </div>
        <div class="calendar-grid" id="calendar"></div>
    </div>
    
    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background: var(--red)"></div>
            <span>Выходной</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: var(--yellow)"></div>
            <span>Неполные</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: var(--green)"></div>
            <span>Отработано</span>
        </div>
    </div>
    
    <div class="summary">
        <div>
            <div class="summary-label">Сегодня</div>
            <div class="summary-value" id="todayEarnings">$0.00</div>
            <div class="summary-sub" id="todayHours">0ч</div>
        </div>
        <div style="text-align: right;">
            <div class="summary-label">За месяц</div>
            <div class="summary-value" id="monthEarnings">$0.00</div>
            <div class="summary-sub" id="monthHours">0ч</div>
        </div>
    </div>
    
    <div class="modal-overlay" id="dayModal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Заполнить день</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <div class="selected-date-display">
                Дата:
                <span id="selectedDateDisplay">-</span>
            </div>
            
            <div class="form-group">
                <label>Статус дня</label>
                <div class="status-selector">
                    <button class="status-btn red" onclick="setStatus('red')">Выходной</button>
                    <button class="status-btn yellow" onclick="setStatus('yellow')">Жду</button>
                    <button class="status-btn green" onclick="setStatus('green')">Работал</button>
                </div>
            </div>
            
            <div class="time-row" id="timeContainer">
                <div class="time-field">
                    <label>Начало (слева)</label>
                    <div class="time-input-wrapper">
                        <input type="time" id="startTime" value="07:35">
                    </div>
                </div>
                <div class="time-field">
                    <label>Конец (справа)</label>
                    <div class="time-input-wrapper">
                        <input type="time" id="endTime" value="21:30">
                    </div>
                </div>
            </div>
            
            <button class="save-btn" onclick="saveDay()">Сохранить</button>
            <button class="delete-btn" onclick="deleteDay()">Удалить запись</button>
        </div>
    </div>
    
    <script>
        let currentDate = new Date();
        let selectedDateKey = null;
        let selectedStatus = 'green';
        let dayData = {};
        
        // Загрузка данных
        try {
            const saved = localStorage.getItem('workHours');
            if (saved) dayData = JSON.parse(saved);
        } catch(e) {
            console.log('Storage not available');
        }
        
        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
            "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
        ];
        
        // Загрузка ставки
        const rateInput = document.getElementById('hourlyRate');
        try {
            rateInput.value = localStorage.getItem('hourlyRate') || '';
        } catch(e) {}
        
        rateInput.addEventListener('change', function() {
            try {
                localStorage.setItem('hourlyRate', this.value);
            } catch(e) {}
            updateSummary();
        });
        
        // Обработчик выбора даты
        document.getElementById('datePicker').addEventListener('change', function(e) {
            const dateVal = e.target.value;
            if (!dateVal) return;
            
            const parts = dateVal.split('-');
            const year = parseInt(parts[0]);
            const month = parseInt(parts[1]) - 1;
            const day = parseInt(parts[2]);
            
            const date = new Date(year, month, day);
            selectedDateKey = formatDateKey(year, month + 1, day);
            
            openModal(date);
            
            // Переключить календарь на этот месяц
            currentDate = new Date(year, month, 1);
            renderCalendar();
        });
        
        function formatDateKey(year, month, day) {
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }
        
        function getMonthKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        }
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonth').textContent = 
                `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDay = firstDay.getDay();
            
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            // Пустые ячейки
            for (let i = 0; i < startingDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell empty';
                calendar.appendChild(empty);
            }
            
            const today = new Date();
            const todayKey = formatDateKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dayKey = formatDateKey(year, month + 1, day);
                const data = dayData[dayKey];
                
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                if (dayKey === todayKey) {
                    cell.classList.add('today');
                }
                
                if (data && data.status) {
                    cell.classList.add(data.status);
                }
                
                cell.innerHTML = `
                    <div class="day-number">${day}</div>
                    <div class="day-indicator"></div>
                `;
                
                cell.onclick = () => {
                    const date = new Date(year, month, day);
                    selectedDateKey = dayKey;
                    openModal(date);
                };
                
                calendar.appendChild(cell);
            }
            
            updateSummary();
        }
        
        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }
        
        function openModal(date) {
            const display = document.getElementById('selectedDateDisplay');
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            display.textContent = date.toLocaleDateString('ru-RU', options);
            
            const data = dayData[selectedDateKey] || {};
            
            // Установка статуса
            setStatus(data.status || 'green');
            
            // Установка времени
            document.getElementById('startTime').value = data.start || '07:35';
            document.getElementById('endTime').value = data.end || '21:30';
            
            // Показать модалку
            document.getElementById('dayModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
            // Очистить input date чтобы можно было выбрать ту же дату снова
            document.getElementById('datePicker').value = '';
        }
        
        function setStatus(status) {
            selectedStatus = status;
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.status-btn.${status}`).classList.add('active');
            
            const timeContainer = document.getElementById('timeContainer');
            if (status === 'red') {
                timeContainer.style.opacity = '0.3';
                timeContainer.style.pointerEvents = 'none';
            } else {
                timeContainer.style.opacity = '1';
                timeContainer.style.pointerEvents = 'auto';
            }
        }
        
        function calculateHours(start, end) {
            if (!start || !end) return 0;
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            
            let startMin = sh * 60 + sm;
            let endMin = eh * 60 + em;
            
            if (endMin < startMin) {
                endMin += 24 * 60; // Ночная смена
            }
            
            return (endMin - startMin) / 60;
        }
        
        function saveDay() {
            if (!selectedDateKey) return;
            
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            
            if (selectedStatus !== 'red' && (!start || !end)) {
                alert('Укажите время начала и окончания работы');
                return;
            }
            
            const hours = selectedStatus === 'red' ? 0 : calculateHours(start, end);
            
            dayData[selectedDateKey] = {
                status: selectedStatus,
                start: start,
                end: end,
                hours: hours
            };
            
            try {
                localStorage.setItem('workHours', JSON.stringify(dayData));
            } catch(e) {}
            
            renderCalendar();
            closeModal();
        }
        
        function deleteDay() {
            if (!selectedDateKey) return;
            delete dayData[selectedDateKey];
            try {
                localStorage.setItem('workHours', JSON.stringify(dayData));
            } catch(e) {}
            renderCalendar();
            closeModal();
        }
        
        function updateSummary() {
            const rate = parseFloat(rateInput.value) || 0;
            const today = new Date();
            const todayKey = formatDateKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
            const currentMonthPrefix = getMonthKey(currentDate);
            
            let todayHours = 0;
            let monthHours = 0;
            let monthEarnings = 0;
            
            Object.keys(dayData).forEach(key => {
                const data = dayData[key];
                if (data && data.hours && (data.status === 'green' || data.status === 'yellow')) {
                    if (key === todayKey) {
                        todayHours = data.hours;
                    }
                    if (key.startsWith(currentMonthPrefix)) {
                        monthHours += data.hours;
                    }
                }
            });
            
            monthEarnings = monthHours * rate;
            const todayEarnings = todayHours * rate;
            
            document.getElementById('todayEarnings').textContent = `$${todayEarnings.toFixed(2)}`;
            document.getElementById('todayHours').textContent = formatHours(todayHours);
            document.getElementById('monthEarnings').textContent = `$${monthEarnings.toFixed(2)}`;
            document.getElementById('monthHours').textContent = formatHours(monthHours);
        }
        
        function formatHours(hours) {
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            return `${h}ч ${m}м`;
        }
        
        // Свайпы
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});
        
        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (Math.abs(touchEndX - touchStartX) > 50) {
                if (touchEndX < touchStartX) changeMonth(1);
                else changeMonth(-1);
            }
        }, {passive: true});
        
        // Инициализация
        renderCalendar();
    </script>
</body>
</html>
